<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Fattura - Edit Bill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        .table-row {
            transition: all 0.2s ease;
        }

        .table-row:hover {
            background-color: #f8fafc;
            transform: scale(1.01);
        }

        .section-card {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delete-btn {
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            transform: scale(1.1);
        }

        .step-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<header th:replace="~{fragments/header :: header}"></header>

<div class="max-w-6xl mx-auto px-4 pb-12">

    <!-- Header -->
    <div class="mb-8">
        <a href="/all-bills" class="inline-flex items-center gap-2 text-purple-600 hover:text-purple-700 font-semibold mb-4 group">
            <svg class="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span data-i18n="update.backBtn">Back to All Bills</span>
        </a>
        <h1 class="text-4xl font-bold text-gray-900 mb-2" data-i18n="update.title">Modify Invoice Details</h1>
        <p class="text-gray-600" data-i18n="update.subtitle">Update header details for this bill</p>
    </div>

    <div class="space-y-6">

        <!-- Section 1: Bill Information -->
        <div class="section-card bg-white rounded-2xl shadow-lg overflow-hidden border-2 border-purple-100">
            <div class="gradient-bg px-6 py-4 flex items-center gap-3">
                <div class="step-badge bg-white text-purple-600">1</div>
                <h2 class="text-xl font-bold text-white" data-i18n="update.invoice">Invoice</h2>
            </div>

            <div class="p-6">
                <form th:action="@{/update-bill/{docNo}(docNo=${bill.docNo})}" th:object="${bill}" method="post" class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path>
                                </svg>
                                <span data-i18n="update.docNo">Document Number (Read-only)</span>
                            </div>
                        </label>
                        <input
                                type="text"
                                th:value="${bill.displayDocNo}"
                                readonly
                                class="w-full border-2 border-gray-200 p-3 rounded-xl bg-gray-50 text-gray-500 font-mono">
                    </div>

                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                <span data-i18n="update.date">Date</span>
                            </div>
                        </label>
                        <input
                                type="date"
                                th:field="*{date}"
                                class="input-focus w-full border-2 border-gray-200 p-3 rounded-xl outline-none transition-all">
                    </div>

                    <div class="flex items-end">
                        <button type="submit" class="btn-primary text-white px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center gap-2 whitespace-nowrap">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            <span data-i18n="update.saveBtn">Update Invoice</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Section 2: Add Product -->
        <div class="section-card bg-white rounded-2xl shadow-lg overflow-hidden border-2 border-green-100">
            <div class="bg-gradient-to-r from-green-500 to-green-600 px-6 py-4 flex items-center gap-3">
                <div class="step-badge bg-white text-green-600">2</div>
                <h2 class="text-xl font-bold text-white" data-i18n="update.addProduct">Aggiungi Prodotto (Add Product)</h2>
            </div>

            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-4">
                    <input
                            type="text"
                            id="aIan"
                            data-i18n-placeholder="ian.searchPlaceholder"
                            placeholder="IAN Code"
                            class="input-focus border-2 border-gray-200 p-3 rounded-xl outline-none transition-all">
                    <input
                            type="text"
                            id="aName"
                            data-i18n-placeholder="dashboard.productName"
                            placeholder="Product Name"
                            class="input-focus border-2 border-gray-200 p-3 rounded-xl outline-none transition-all">
                    <input
                            type="number"
                            id="aQty"
                            data-i18n-placeholder="dashboard.qty"
                            placeholder="Quantity"
                            class="input-focus border-2 border-gray-200 p-3 rounded-xl outline-none transition-all">
                    <select id="aUnit" class="input-focus border-2 border-gray-200 p-3 rounded-xl outline-none transition-all bg-white">
                        <option value="pcs">pcs</option>
                        <option value="kg">kg</option>
                        <option value="ltr">ltr</option>
                        <option value="pkt">pkt</option>
                    </select>
                    <input
                            type="number"
                            id="aPrice"
                            data-i18n-placeholder="dashboard.price"
                            placeholder="Price (€)"
                            class="input-focus border-2 border-gray-200 p-3 rounded-xl outline-none transition-all">
                </div>
                <button onclick="saveNewProduct()" class="btn-success text-white px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span data-i18n="update.saveProduct">Salva Prodotto (Save to DB)</span>
                </button>
            </div>
        </div>

        <!-- Section 3: Product List -->
        <div class="section-card bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-gradient-to-r from-slate-700 to-slate-800 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="step-badge bg-white text-slate-700">3</div>
                    <h2 class="text-xl font-bold text-white" data-i18n="update.currentItems">Elenco Prodotti (Current Items)</h2>
                </div>
                <div class="badge bg-white bg-opacity-20 text-white px-3 py-1 rounded-full text-sm font-semibold">
                    <span th:text="${#lists.size(bill.products)}">0</span> <span data-i18n="details.items">Items</span>
                </div>
            </div>

            <div class="p-6">
                <div class="overflow-hidden rounded-xl border-2 border-gray-100 mb-6">
                    <table class="w-full">
                        <thead>
                        <tr class="bg-gradient-to-r from-slate-50 to-slate-100">
                            <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                                    </svg>
                                    <span data-i18n="details.tableName">Nome (Name)</span>
                                </div>
                            </th>
                            <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path>
                                    </svg>
                                    <span data-i18n="details.tableQty">Qtà (Qty)</span>
                                </div>
                            </th>
                            <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    </svg>
                                    <span data-i18n="details.tablePrice">Prezzo (Price)</span>
                                </div>
                            </th>
                            <th class="text-right p-4 text-xs font-bold text-gray-600 uppercase tracking-wider" data-i18n="bills.tableActions">
                                Azioni (Actions)
                            </th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                        <tr th:each="p : ${bill.products}" class="table-row">
                            <td class="p-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-gradient-to-br from-purple-100 to-purple-200 rounded-lg flex items-center justify-center flex-shrink-0">
                                        <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                                        </svg>
                                    </div>
                                    <span class="font-semibold text-gray-900" th:text="${p.name}">Product Name</span>
                                </div>
                            </td>
                            <td class="p-4">
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-50 text-blue-700" th:text="${p.quantity + ' ' + p.unit}">10 pcs</span>
                            </td>
                            <td class="p-4">
                                    <span class="font-semibold text-gray-900">
                                        € <span th:text="${#numbers.formatDecimal(p.price, 1, 2)}">0.00</span>
                                    </span>
                            </td>
                            <td class="p-4 text-right">
                                <button
                                        th:onclick="'deleteProduct(' + ${p.id} + ')'"
                                        class="delete-btn inline-flex items-center gap-1 text-red-600 hover:text-red-700 font-semibold text-sm bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                    <span data-i18n="bills.actionDelete">Delete</span>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Total & Actions -->
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 pt-6 border-t-2 border-gray-100">
                    <div class="bg-gradient-to-r from-purple-50 to-purple-100 px-6 py-4 rounded-xl border-2 border-purple-200">
                        <p class="text-sm font-semibold text-purple-600 uppercase tracking-wide mb-1" data-i18n="details.grandTotal">Total Amount</p>
                        <p class="text-3xl font-bold text-purple-900">
                            € <span th:text="${#numbers.formatDecimal(bill.totalAmount, 1, 2)}">0.00</span>
                        </p>
                    </div>

                    <a href="/all-bills" class="bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-800 hover:to-slate-900 text-white px-8 py-4 rounded-xl font-bold shadow-lg transition-all duration-300 hover:shadow-xl flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span data-i18n="update.done">Done</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // API Call to add a new product to an existing bill
    async function saveNewProduct() {
        const docNo = /*[[${bill.docNo}]]*/ '';

        const ian = document.getElementById('aIan').value;
        const name = document.getElementById('aName').value;
        const qty = document.getElementById('aQty').value;
        const unit = document.getElementById('aUnit').value;
        const price = document.getElementById('aPrice').value;

        if(!ian || !name || !qty || !price) {
            alert(i18next.t('dashboard.fillRequired'));
            return;
        }

        const data = {
            products: [{
                ian: ian,
                name: name,
                quantity: parseFloat(qty),
                unit: unit,
                price: parseFloat(price)
            }]
        };

        try {
            const res = await fetch(`/api/bills/${docNo}/add-product`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) {
                location.reload();
            } else {
                alert("Error saving product. Please try again.");
            }
        } catch(error) {
            console.error('Error:', error);
            alert("Error saving product. Please try again.");
        }
    }

    // API Call to delete a product by ID
    async function deleteProduct(id) {
        if(confirm(i18next.t('bills.deleteConfirm'))) {
            try {
                const res = await fetch(`/api/bills/product/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    location.reload();
                } else {
                    alert("Error deleting product. Please try again.");
                }
            } catch(error) {
                console.error('Error:', error);
                alert("Error deleting product. Please try again.");
            }
        }
    }
</script>
</body>
</html>
