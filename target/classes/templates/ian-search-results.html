<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAN Search - Bill Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .search-input:focus { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        .search-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3); }
        .table-row { transition: all 0.2s ease; }
        .table-row:hover { background-color: #f8fafc; transform: translateX(4px); }
        .result-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<header th:replace="~{fragments/header :: header}"></header>

<div class="max-w-6xl mx-auto px-4 pb-12">
    <div class="mb-6">
        <a href="/all-bills" class="inline-flex items-center gap-2 text-purple-600 hover:text-purple-700 font-semibold group">
            <svg class="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            <span data-i18n="ian.backBtn">Back to All Bills</span>
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="gradient-bg px-8 py-8 relative overflow-hidden text-white">
            <h1 class="text-3xl font-bold" data-i18n="ian.title">Product IAN History</h1>
            <p class="opacity-80" data-i18n="ian.subtitle">Track the purchase history of specific items in Italy (€)</p>
        </div>

        <div class="p-8">
            <form th:action="@{/search-ian}" method="get" class="mb-8">
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" name="ian" th:value="${searchedIan}" data-i18n-placeholder="ian.searchPlaceholder" placeholder="Enter IAN (AIN)..."
                           class="w-full border-2 border-gray-200 p-4 rounded-xl outline-none search-input" required>
                    <button type="submit" class="search-btn text-white px-8 py-4 rounded-xl font-bold shadow-lg" data-i18n="ian.searchBtn">Search</button>
                </div>
            </form>

            <div th:if="${results != null && !#lists.isEmpty(results)}" class="result-card">
                <div class="overflow-hidden rounded-xl border-2 border-gray-100">
                    <table class="w-full">
                        <thead class="bg-slate-50 text-gray-600">
                        <tr>
                            <th class="text-left p-4 text-xs font-bold uppercase" data-i18n="ian.tableName">Product Name</th>
                            <th class="text-left p-4 text-xs font-bold uppercase" data-i18n="ian.tablePrice">Price (€)</th>
                            <th class="text-left p-4 text-xs font-bold uppercase" data-i18n="ian.tableBill">Bill No</th>
                            <th class="text-left p-4 text-xs font-bold uppercase" data-i18n="ian.tableDate">Date</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                        <tr th:each="r : ${results}" class="table-row">
                            <td class="p-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-gray-900" th:text="${r.name}">Product Name</span>
                                    <span class="text-xs text-gray-400 font-mono" th:text="${r.ian}">IAN-123</span>
                                </div>
                            </td>
                            <td class="p-4 font-bold text-gray-900">
                                € <span th:text="${#numbers.formatDecimal(r.price, 1, 2)}">0.00</span>
                            </td>
                            <td class="p-4">
                                <a th:href="@{/view-bill/{d}(d=${r.bill.docNo})}"
                                   class="text-purple-600 font-bold hover:underline" th:text="${r.bill.displayDocNo}"></a>
                            </td>
                            <td class="p-4 text-gray-600">
                                <span class="badge bg-blue-50 text-blue-700" th:text="${r.bill.date}">2026-01-05</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:if="${results != null && #lists.isEmpty(results)}" class="text-center py-16 text-gray-400">
                <p class="text-xl font-bold" data-i18n="ian.noResults">No results found for this IAN.</p>
            </div>
            <div th:if="${results == null}" class="text-center py-16 text-gray-400">
                <p data-i18n="ian.searchPlaceholder">Enter an IAN above to see the full pricing and purchase history.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
