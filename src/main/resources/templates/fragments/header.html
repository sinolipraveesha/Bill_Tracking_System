<!-- Premium Navigation Header Fragment -->
<header th:fragment="header" class="bg-white shadow-md border-b border-slate-100 sticky top-0 z-50 backdrop-blur-md bg-opacity-95 mb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <!-- Left: Logo & Main Navigation -->
            <div class="flex items-center gap-8">
                <a href="/" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg group-hover:scale-105 transition-all">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent" data-i18n="nav.logo">Bill Tracker</span>
                </a>

                <nav class="hidden md:flex items-center gap-1">
                    <a href="/" class="px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all duration-200"
                       th:classappend="${currentUri == '/' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-700 hover:text-indigo-600 hover:bg-slate-50'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        <span data-i18n="nav.dashboard">Dashboard</span>
                    </a>
                    <a href="/all-bills" class="px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all duration-200"
                       th:classappend="${currentUri == '/all-bills' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-700 hover:text-indigo-600 hover:bg-slate-50'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                        </svg>
                        <span data-i18n="nav.allBills">All Bills</span>
                    </a>
                    <a href="/search-ian" class="px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all duration-200"
                       th:classappend="${currentUri == '/search-ian' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-700 hover:text-indigo-600 hover:bg-slate-50'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <span data-i18n="nav.searchIan">Search IAN</span>
                    </a>
                    <a href="/analytics" class="px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all duration-200"
                       th:classappend="${currentUri == '/analytics' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-700 hover:text-indigo-600 hover:bg-slate-50'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <span data-i18n="nav.analytics">Analytics</span>
                    </a>
                    <a href="/profile" class="px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all duration-200"
                       th:classappend="${currentUri == '/profile' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-700 hover:text-indigo-600 hover:bg-slate-50'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span data-i18n="nav.profile">Profile Settings</span>
                    </a>
                </nav>
            </div>

            <!-- Right: User Menu & Profile & Logout & Language Picker -->
            <div class="flex items-center gap-4">
                <!-- Language Picker -->
                <div class="flex items-center gap-1.5 bg-slate-50 border border-slate-200 rounded-xl px-2.5 py-1.5 shadow-sm">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5c-.313 1.567-.88 3.054-1.678 4.385M9 11c-.62 0-1.218-.117-1.768-.33"></path>
                    </svg>
                    <select id="langPicker" onchange="changeLanguage(this.value)" class="bg-transparent text-sm font-semibold text-gray-700 outline-none cursor-pointer">
                        <option value="en" th:selected="${preferredLanguage == 'en'}">English</option>
                        <option value="it" th:selected="${preferredLanguage == 'it'}">Italiano</option>
                        <option value="es" th:selected="${preferredLanguage == 'es'}">Español</option>
                        <option value="fr" th:selected="${preferredLanguage == 'fr'}">Français</option>
                        <option value="de" th:selected="${preferredLanguage == 'de'}">Deutsch</option>
                        <option value="si" th:selected="${preferredLanguage == 'si'}">සිංහල</option>
                        <option value="ta" th:selected="${preferredLanguage == 'ta'}">தமிழ்</option>
                        <option value="zh" th:selected="${preferredLanguage == 'zh'}">中文</option>
                        <option value="ja" th:selected="${preferredLanguage == 'ja'}">日本語</option>
                        <option value="th" th:selected="${preferredLanguage == 'th'}">ไทย</option>
                    </select>
                </div>

                <div class="hidden sm:flex flex-col text-right">
                    <span class="text-xs text-gray-400 font-medium" data-i18n="nav.loggedInAs">Logged in as</span>
                    <span class="text-sm font-bold text-gray-800" th:text="${#authentication.name}">admin</span>
                </div>

                <div class="h-8 w-px bg-slate-200 hidden sm:block"></div>

                <a href="/profile" class="p-2 rounded-xl hover:bg-slate-50 text-gray-500 hover:text-indigo-600 transition-all flex items-center gap-2" data-i18n-title="nav.profile">
                    <div class="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center hover:bg-slate-200 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                </a>

                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="p-2 rounded-xl hover:bg-red-50 text-gray-500 hover:text-red-600 transition-all flex items-center justify-center" data-i18n-title="nav.logout">
                        <div class="w-9 h-9 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-100 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </div>
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- i18next Client-Side Scripts -->
    <script src="https://unpkg.com/i18next@21.6.14/dist/umd/i18next.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const userLang = /*[[${preferredLanguage}]]*/ 'en';
        
        async function changeLanguage(lang) {
            try {
                const response = await fetch('/api/user/language?lang=' + lang, {
                    method: 'POST'
                });
                if (response.ok) {
                    location.reload();
                } else {
                    console.error('Failed to change language preference');
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        function translatePage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = i18next.t(key);
                if (translation) {
                    if (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'number' || el.type === 'password')) {
                        el.placeholder = translation;
                    } else if (el.tagName === 'SELECT') {
                        // For select placeholder options or default text
                    } else {
                        el.innerText = translation;
                    }
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = i18next.t(key);
            });
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                el.title = i18next.t(key);
            });
        }
        
        async function initI18n() {
            try {
                const cacheBuster = new Date().getTime();
                
                // Always load English as fallback
                const enRes = await fetch('/locales/en.json?v=' + cacheBuster).then(r => r.json());
                
                const resources = {
                    en: { translation: enRes }
                };

                // If user selected another language, load it
                if (userLang !== 'en') {
                    try {
                        const langRes = await fetch('/locales/' + userLang + '.json?v=' + cacheBuster).then(r => r.json());
                        resources[userLang] = { translation: langRes };
                    } catch (e) {
                        console.error('Could not load language:', userLang);
                    }
                }
                
                await i18next.init({
                    lng: userLang,
                    fallbackLng: 'en',
                    resources: resources
                });
                
                translatePage();
                
                // Trigger any page-specific localization callbacks if defined
                if (typeof onLanguageInit === 'function') {
                    onLanguageInit();
                }
            } catch (e) {
                console.error('Error initializing translation:', e);
            }
        }
        
        document.addEventListener('DOMContentLoaded', initI18n);
        /*]]>*/
    </script>
</header>
