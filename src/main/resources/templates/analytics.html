<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Bill Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<header th:replace="~{fragments/header :: header}"></header>

<div class="max-w-7xl mx-auto px-4 pb-12">
    <!-- Header Section -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6">
        <div class="gradient-bg px-8 py-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mr-32 -mt-32"></div>
            <div class="relative z-10">
                <h1 class="text-3xl font-bold text-white mb-2 flex items-center gap-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <span data-i18n="nav.analytics">Analytics Overview</span>
                </h1>
                <p class="text-purple-100 text-sm">Visualize your spending and shop insights</p>
            </div>
        </div>
    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <!-- 6-Month Trends -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                6-Month Spending Trends
            </h3>
            <div class="relative h-72 w-full">
                <canvas id="spendingChart"></canvas>
            </div>
        </div>

        <!-- Sales by Shop -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                Spending by Store
            </h3>
            <div class="relative h-72 w-full flex justify-center">
                <canvas id="shopChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", () => {
        // Wait for i18next to initialize if needed
        setTimeout(() => {
            loadTrends();
            loadShops();
        }, 300);
    });

    async function loadTrends() {
        try {
            const res = await fetch('/api/bills/summary/trends');
            if (!res.ok) return;
            const data = await res.json();

            const ctx = document.getElementById('spendingChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Spending (€)',
                        data: data.data,
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderRadius: 6,
                        hoverBackgroundColor: 'rgba(118, 75, 162, 0.9)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f3f4f6' }, border: { display: false } },
                        x: { grid: { display: false }, border: { display: false } }
                    }
                }
            });
        } catch (e) { console.error(e); }
    }

    async function loadShops() {
        try {
            const res = await fetch('/api/bills/summary/shops');
            if (!res.ok) return;
            const data = await res.json();

            // Vibrant color palette for the doughnut chart
            const colors = [
                'rgba(118, 75, 162, 0.8)', // Purple
                'rgba(102, 126, 234, 0.8)', // Indigo
                'rgba(52, 211, 153, 0.8)',  // Emerald
                'rgba(244, 114, 182, 0.8)', // Pink
                'rgba(251, 146, 60, 0.8)',  // Orange
                'rgba(56, 189, 248, 0.8)'   // Sky
            ];

            const ctx = document.getElementById('shopChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.labels,
                    datasets: [{
                        data: data.data,
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'right' }
                    }
                }
            });
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
