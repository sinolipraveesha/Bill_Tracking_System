# Database Connection using Environment Variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Relationship management
spring.jackson.serialization.fail-on-empty-beans=false

# Server Port (assigned dynamically by Render/cloud host, defaults to 8080 locally)
server.port=${PORT:8080}

# Base Application URL (Used for QR Code generation)
# Change this to your local IP address for Wi-Fi mobile testing (e.g. http://192.168.1.X:8080)
BASE_APP_URL=${BASE_APP_URL:http://localhost:8080}