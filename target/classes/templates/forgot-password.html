<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Tracker - Recover Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .animated-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-recover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-recover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .card-anim {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<!-- Decorative Elements -->
<div class="decorative-circle circle-1"></div>
<div class="decorative-circle circle-2"></div>

<div class="card-anim w-full max-w-md relative z-10">

    <!-- Logo/Icon Section -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-2xl mb-4 floating">
            <svg class="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>
        <h1 class="text-4xl font-bold text-white mb-2">Account Recovery</h1>
        <p class="text-purple-100 text-sm">Recover your password securely</p>
    </div>

    <!-- Main Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8 backdrop-blur-lg">

        <!-- Error Alert -->
        <div th:if="${error}" class="error-shake mb-6 bg-red-50 border-2 border-red-200 rounded-xl p-4 flex items-start gap-3">
            <div class="w-5 h-5 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <div>
                <p class="text-red-800 font-semibold text-sm">Recovery Error</p>
                <p class="text-red-600 text-xs mt-1" th:text="${error}">Error details</p>
            </div>
        </div>

        <!-- STEP 1: Enter Username -->
        <div th:if="${step == null or step != 2}">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Identify Account</h2>
                <p class="text-gray-600 text-sm">Enter your username to look up your security question.</p>
            </div>

            <form th:action="@{/forgot-password}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input
                                type="text"
                                name="username"
                                required
                                placeholder="Enter your username"
                                class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                    </div>
                </div>

                <button
                        type="submit"
                        class="btn-recover w-full text-white py-3.5 rounded-xl font-bold text-base shadow-lg flex items-center justify-center gap-2">
                    <span>Continue</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>
        </div>

        <!-- STEP 2: Answer Security Question and Reset Password -->
        <div th:if="${step == 2}">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Verify Identity</h2>
                <p class="text-gray-600 text-sm">Answer the security question to reset your password.</p>
            </div>

            <form th:action="@{/reset-password}" method="post" class="space-y-5">
                <input type="hidden" name="username" th:value="${username}">

                <!-- Security Question Prompt -->
                <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl">
                    <span class="text-xs text-indigo-500 font-semibold block uppercase tracking-wider mb-1">Security Question</span>
                    <span class="text-sm font-bold text-indigo-900" th:text="${question}">What is your favorite color?</span>
                </div>

                <!-- Answer field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Security Answer</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <input
                                type="text"
                                name="answer"
                                required
                                autocomplete="off"
                                placeholder="Enter your answer"
                                class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                    </div>
                </div>

                <!-- New Password Field -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input
                                type="password"
                                name="newPassword"
                                required
                                placeholder="Enter your new password"
                                class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                    </div>
                </div>

                <button
                        type="submit"
                        class="btn-recover w-full text-white py-3.5 rounded-xl font-bold text-base shadow-lg flex items-center justify-center gap-2">
                    <span>Reset Password</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </button>
            </form>
        </div>

        <div class="text-center mt-6 pt-6 border-t border-gray-100">
            <a href="/login" class="inline-flex items-center gap-2 text-sm font-bold text-purple-600 hover:text-purple-700 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Sign In
            </a>
        </div>
    </div>
</div>

</body>
</html>
