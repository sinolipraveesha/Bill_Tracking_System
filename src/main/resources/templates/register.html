<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Tracker - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .animated-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .card-anim {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<!-- Decorative Elements -->
<div class="decorative-circle circle-1"></div>
<div class="decorative-circle circle-2"></div>

<div class="card-anim w-full max-w-md relative z-10 my-8">

    <!-- Logo/Icon Section -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-2xl mb-4 floating">
            <svg class="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
            </svg>
        </div>
        <h1 class="text-4xl font-bold text-white mb-2">Create Account</h1>
        <p class="text-purple-100 text-sm">Sign up for a new Bill Tracker account</p>
    </div>

    <!-- Main Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8 backdrop-blur-lg">

        <!-- Error Alert -->
        <div th:if="${error}" class="error-shake mb-6 bg-red-50 border-2 border-red-200 rounded-xl p-4 flex items-start gap-3">
            <div class="w-5 h-5 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <div>
                <p class="text-red-800 font-semibold text-sm">Registration Failed</p>
                <p class="text-red-600 text-xs mt-1" th:text="${error}">Error details</p>
            </div>
        </div>

        <form th:action="@{/register}" method="post" class="space-y-5">
            <!-- Username -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input
                            type="text"
                            name="username"
                            th:value="${username}"
                            required
                            placeholder="Choose a username"
                            class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input
                            type="password"
                            name="password"
                            required
                            placeholder="Enter password"
                            class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input
                            type="password"
                            name="confirmPassword"
                            required
                            placeholder="Confirm your password"
                            class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                </div>
            </div>

            <!-- Security Question -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Security Recovery Question</label>
                <div class="relative">
                    <select
                            name="recoveryQuestion"
                            class="input-focus w-full border-2 border-gray-200 px-4 py-3 rounded-xl outline-none transition-all text-gray-900 bg-white font-medium">
                        <option value="What was the name of your first pet?" th:selected="${recoveryQuestion == 'What was the name of your first pet?'}">What was the name of your first pet?</option>
                        <option value="In what city were you born?" th:selected="${recoveryQuestion == 'In what city were you born?'}">In what city were you born?</option>
                        <option value="What is your favorite food?" th:selected="${recoveryQuestion == 'What is your favorite food?'}">What is your favorite food?</option>
                        <option value="What was the name of your primary school?" th:selected="${recoveryQuestion == 'What was the name of your primary school?'}">What was the name of your primary school?</option>
                    </select>
                </div>
            </div>

            <!-- Security Answer -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Recovery Answer</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                    </div>
                    <input
                            type="text"
                            name="recoveryAnswer"
                            th:value="${recoveryAnswer}"
                            required
                            placeholder="Enter the answer for recovery"
                            class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all text-gray-900 placeholder-gray-400">
                </div>
            </div>

            <button
                    type="submit"
                    class="btn-register w-full text-white py-3.5 rounded-xl font-bold text-base shadow-lg flex items-center justify-center gap-2">
                <span>Sign Up</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-gray-100">
            <p class="text-sm text-gray-600">
                Already have an account?
                <a href="/login" class="font-bold text-purple-600 hover:text-purple-700 transition-all underline">Sign In</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
