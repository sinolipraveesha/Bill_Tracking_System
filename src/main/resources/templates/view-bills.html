<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill List - Bill Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        .table-row {
            transition: all 0.2s ease;
        }

        .table-row:hover {
            background-color: #f8fafc;
            transform: scale(1.005);
        }

        .action-btn {
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .ian-chip {
            transition: all 0.2s ease;
        }

        .ian-chip:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<header th:replace="~{fragments/header :: header}"></header>

<div class="max-w-7xl mx-auto px-4 pb-12">

    <!-- Header Section -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6">
        <div class="gradient-bg px-8 py-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mr-32 -mt-32"></div>
            <div class="absolute bottom-0 left-0 w-48 h-48 bg-white opacity-5 rounded-full -ml-24 -mb-24"></div>

            <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-white mb-2 flex items-center gap-3">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <span data-i18n="bills.title">All Bills</span>
                    </h1>
                    <p class="text-purple-100 text-sm" data-i18n="bills.subtitle">Browse and manage your saved invoices</p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <a href="/" class="btn-success text-white px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <span data-i18n="dashboard.newBill">New Bill</span>
                    </a>
                    <a href="/search-ian" class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2 backdrop-blur-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <span data-i18n="nav.searchIan">Search IAN</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="p-6 bg-gradient-to-r from-slate-50 to-slate-100 border-b-2 border-gray-100">
            <form th:action="@{/all-bills}" method="get" class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1 relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input
                            type="text"
                            name="docNo"
                            data-i18n-placeholder="bills.searchPlaceholder"
                            placeholder="Search by Document Number..."
                            class="input-focus w-full border-2 border-gray-200 pl-12 pr-4 py-3 rounded-xl outline-none transition-all">
                </div>
                <button type="submit" class="btn-primary text-white px-8 py-3 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2 whitespace-nowrap">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <span data-i18n="bills.searchBtn">Search</span>
                </button>
                <a th:href="@{/all-bills}" class="bg-white hover:bg-gray-50 border-2 border-gray-200 px-6 py-3 rounded-xl font-semibold text-gray-700 transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    <span data-i18n="bills.clearBtn">Clear</span>
                </a>
            </form>
        </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                <tr class="bg-gradient-to-r from-slate-50 to-slate-100 border-b-2 border-gray-200">
                    <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path>
                            </svg>
                            <span data-i18n="bills.tableDoc">Document No</span>
                        </div>
                    </th>
                    <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                            </svg>
                            <span data-i18n="bills.tableProducts">Associated Products</span>
                        </div>
                    </th>
                    <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span data-i18n="bills.tableDate">Date</span>
                        </div>
                    </th>
                    <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span data-i18n="bills.tableStatus">Status</span>
                        </div>
                    </th>
                    <th class="text-left p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                            </svg>
                            <span data-i18n="dashboard.tableQuantity">Quantity</span>
                        </div>
                    </th>
                    <th class="text-right p-4 text-xs font-bold text-gray-600 uppercase tracking-wider">
                        <div class="flex items-center justify-end gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span data-i18n="bills.tableAmount">Total Amount</span>
                        </div>
                    </th>
                    <th class="text-center p-4 text-xs font-bold text-gray-600 uppercase tracking-wider" data-i18n="bills.tableActions">
                        Actions
                    </th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="bill : ${bills}" th:if="${bill != null}" class="table-row">
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 bg-gradient-to-br from-purple-100 to-purple-200 rounded-lg flex items-center justify-center flex-shrink-0">
                                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            <span class="font-bold text-gray-900" th:text="${bill.displayDocNo}">DOC-001</span>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex flex-col gap-2 max-w-sm">
                            <div th:each="product : ${bill.products}" class="flex items-center justify-between gap-2 bg-white border border-slate-200 rounded-lg shadow-sm p-1.5 transition-all hover:border-purple-300">
                                <div class="flex flex-col overflow-hidden">
                                    <span class="text-xs font-mono font-bold text-indigo-600 truncate" th:text="${product.ian}">123456</span>
                                    <span class="text-[10px] text-gray-500 truncate" th:text="${product.name != null ? product.name : 'Unknown Product'}">Name</span>
                                </div>
                                <select th:data-id="${product.id}" onchange="updateProductStatus(this)" 
                                        class="bg-gray-50 border border-gray-200 text-xs font-bold rounded-md focus:ring-purple-500 focus:border-purple-500 outline-none py-1 px-2 cursor-pointer"
                                        th:classappend="${product.status == 'SOLD' ? 'text-gray-500' : 'text-green-600'}">
                                    <option value="IN_STOCK" th:selected="${product.status == 'IN_STOCK'}" class="text-green-600">In Stock</option>
                                    <option value="SOLD" th:selected="${product.status == 'SOLD'}" class="text-gray-500">Sold</option>
                                </select>
                            </div>
                        </div>
                    </td>
                    <td class="p-4">
                        <span class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-50 text-blue-700 border border-blue-200" th:text="${bill.date}">2024-01-01</span>
                    </td>
                    <td class="p-4">
                        <select th:data-doc="${bill.docNo}" onchange="updateBillStatus(this)" class="bg-gray-50 border border-gray-200 text-gray-900 text-xs font-bold rounded-lg focus:ring-purple-500 focus:border-purple-500 outline-none p-2 shadow-sm transition-all cursor-pointer">
                            <option value="IN_STOCK" th:selected="${bill.overallStatus == 'IN_STOCK'}" class="text-green-600">In Stock</option>
                            <option value="SOLD" th:selected="${bill.overallStatus == 'SOLD'}" class="text-gray-500">Sold</option>
                            <option value="MIXED" th:if="${bill.overallStatus == 'MIXED'}" selected disabled class="text-amber-500">Mixed</option>
                        </select>
                    </td>
                    <td class="p-4">
                            <span class="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-bold bg-green-50 text-green-700 border border-green-200">
                                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                                </svg>
                                <span th:text="${bill.products.size()}">0</span>
                            </span>
                    </td>
                    <td class="p-4 text-right">
                        <div class="inline-flex items-center gap-1 font-bold text-lg text-emerald-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            € <span th:text="${#numbers.formatDecimal(bill.totalAmount, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex justify-center gap-2">
                            <a th:href="@{/view-bill/{docNo}(docNo=${bill.docNo})}"
                               class="action-btn inline-flex items-center gap-1 text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-lg font-semibold text-sm transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                                <span data-i18n="bills.actionView">View</span>
                            </a>
                            <a th:href="@{/edit-bill/{docNo}(docNo=${bill.docNo})}"
                               class="action-btn inline-flex items-center gap-1 text-amber-600 hover:text-amber-700 bg-amber-50 hover:bg-amber-100 px-3 py-2 rounded-lg font-semibold text-sm transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                                <span data-i18n="bills.actionEdit">Edit</span>
                            </a>
                            <a th:href="@{/export-pdf/{docNo}(docNo=${bill.docNo})}"
                               class="action-btn inline-flex items-center gap-1 text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg font-semibold text-sm transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                                </svg>
                                <span data-i18n="bills.actionPdf">PDF</span>
                            </a>
                            <form th:action="@{/delete-bill/{docNo}(docNo=${bill.docNo})}" method="post" onsubmit="return confirm(i18next.t('bills.deleteConfirm'));" class="inline">
                                <button type="submit" class="action-btn inline-flex items-center gap-1 text-gray-500 hover:text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg font-semibold text-sm transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                    <span data-i18n="bills.actionDelete">Delete</span>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(bills)}" class="text-center py-16">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2" data-i18n="bills.noBills">No Bills Found</h3>
            <a href="/" class="btn-success text-white px-6 py-3 rounded-xl font-semibold shadow-lg inline-flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                <span data-i18n="dashboard.newBill">Create Your First Bill</span>
            </a>
        </div>
    </div>
</div>

<script>
    async function updateBillStatus(selectElement) {
        const docNo = selectElement.getAttribute('data-doc');
        const newStatus = selectElement.value;
        try {
            const res = await fetch('/api/bills/' + encodeURIComponent(docNo) + '/status', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: newStatus })
            });
            if (res.ok) {
                selectElement.classList.add('border-green-500', 'bg-green-50');
                setTimeout(() => {
                    selectElement.classList.remove('border-green-500', 'bg-green-50');
                    location.reload(); // reload to reflect any mixed -> solid state changes visually
                }, 1000);
            } else {
                alert('Failed to update status');
            }
        } catch(e) {
            console.error(e);
            alert('Error updating status');
        }
    }

    async function updateProductStatus(selectElement) {
        const id = selectElement.getAttribute('data-id');
        const newStatus = selectElement.value;
        try {
            const res = await fetch('/api/bills/products/' + encodeURIComponent(id) + '/status', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: newStatus })
            });
            if (res.ok) {
                // Flash success color
                selectElement.classList.add('border-green-500', 'bg-green-50');
                if (newStatus === 'SOLD') {
                    selectElement.classList.remove('text-green-600');
                    selectElement.classList.add('text-gray-500');
                } else {
                    selectElement.classList.remove('text-gray-500');
                    selectElement.classList.add('text-green-600');
                }
                setTimeout(() => {
                    selectElement.classList.remove('border-green-500', 'bg-green-50');
                    // Reload to update the overall bill status column if needed
                    location.reload(); 
                }, 800);
            } else {
                alert('Failed to update product status');
            }
        } catch(e) {
            console.error(e);
            alert('Error updating status');
        }
    }
</script>
</body>
</html>
