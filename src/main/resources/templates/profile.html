<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Bill Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .input-focus:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3); }
        .card-shadow { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<!-- Premium Navigation Header -->
<header th:replace="~{fragments/header :: header}"></header>

<div class="max-w-3xl mx-auto px-4 py-12">

    <!-- Title and breadcrumb -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2" data-i18n="profile.title">Account Settings</h1>
        <p class="text-gray-600 text-sm" data-i18n="profile.subtitle">Update your credentials and setup account recovery security settings</p>
    </div>

    <!-- Alert Success -->
    <div th:if="${param.success}" class="mb-6 bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-4 flex items-start gap-3 shadow-md transition-all">
        <div class="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <div>
            <p class="text-emerald-950 font-semibold text-sm" data-i18n="profile.successTitle">Changes Saved</p>
            <p class="text-emerald-800 text-xs mt-0.5" data-i18n="profile.successDesc">Your profile and security credentials have been updated successfully.</p>
        </div>
    </div>

    <!-- Alert Error -->
    <div th:if="${error}" class="mb-6 bg-red-50 border-2 border-red-200 rounded-2xl p-4 flex items-start gap-3 shadow-md">
        <div class="w-5 h-5 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </div>
        <div>
            <p class="text-red-950 font-semibold text-sm" data-i18n="profile.errorTitle">Update Failed</p>
            <p class="text-red-800 text-xs mt-0.5" th:text="${error}">An error occurred during updating.</p>
        </div>
    </div>

    <!-- Form Settings Card -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden card-shadow border border-slate-100">
        <div class="gradient-bg px-8 py-6 text-white">
            <h2 class="text-xl font-bold flex items-center gap-2" data-i18n="profile.title">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Edit Profile Credentials
            </h2>
        </div>

        <form th:action="@{/profile/update}" method="post" class="p-8 space-y-6">

            <!-- Section Header: Base Info -->
            <div>
                <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-100 pb-2" data-i18n="login.welcome">Login Credentials</h3>
            </div>

            <!-- Username Field -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 items-center">
                <label class="text-sm font-semibold text-gray-700" data-i18n="profile.username">Username</label>
                <div class="md:col-span-2 relative">
                    <input
                            type="text"
                            name="username"
                            th:value="${user.username}"
                            required
                            data-i18n-placeholder="profile.username"
                            placeholder="Username"
                            class="input-focus w-full border-2 border-gray-200 px-4 py-3 rounded-xl outline-none transition-all text-gray-900 font-medium">
                </div>
            </div>

            <!-- Password Field -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 items-center">
                <div>
                    <label class="text-sm font-semibold text-gray-700 block" data-i18n="profile.password">New Password</label>
                </div>
                <div class="md:col-span-2 relative">
                    <input
                            type="password"
                            name="password"
                            data-i18n-placeholder="profile.password"
                            placeholder="Enter new password"
                            class="input-focus w-full border-2 border-gray-200 px-4 py-3 rounded-xl outline-none transition-all text-gray-900">
                </div>
            </div>

            <!-- Preferred Language Field -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 items-center">
                <label class="text-sm font-semibold text-gray-700" data-i18n="profile.preferredLanguage">Preferred Language</label>
                <div class="md:col-span-2 relative">
                    <select
                            name="preferredLanguage"
                            class="input-focus w-full border-2 border-gray-200 px-4 py-3 rounded-xl outline-none transition-all text-gray-900 bg-white font-medium">
                        <option value="en" th:selected="${user.preferredLanguage == 'en'}">English</option>
                        <option value="it" th:selected="${user.preferredLanguage == 'it'}">Italiano</option>
                        <option value="es" th:selected="${user.preferredLanguage == 'es'}">Español</option>
                        <option value="fr" th:selected="${user.preferredLanguage == 'fr'}">Français</option>
                        <option value="de" th:selected="${user.preferredLanguage == 'de'}">Deutsch</option>
                        <option value="si" th:selected="${user.preferredLanguage == 'si'}">සිංහල</option>
                        <option value="ta" th:selected="${user.preferredLanguage == 'ta'}">தமிழ்</option>
                        <option value="zh" th:selected="${user.preferredLanguage == 'zh'}">中文</option>
                        <option value="ja" th:selected="${user.preferredLanguage == 'ja'}">日本語</option>
                        <option value="th" th:selected="${user.preferredLanguage == 'th'}">ไทย</option>
                    </select>
                </div>
            </div>

            <!-- Section Header: Recovery Question -->
            <div class="pt-4">
                <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-100 pb-2" data-i18n="register.recoveryQuestion">Security Recovery</h3>
            </div>

            <!-- Security Question Field -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 items-center">
                <label class="text-sm font-semibold text-gray-700" data-i18n="profile.recoveryQuestion">Security Question</label>
                <div class="md:col-span-2 relative">
                    <select
                            name="recoveryQuestion"
                            class="input-focus w-full border-2 border-gray-200 px-4 py-3 rounded-xl outline-none transition-all text-gray-900 bg-white font-medium">
                        <option value="What is your default recovery key?" th:selected="${user.recoveryQuestion == 'What is your default recovery key?'}" data-i18n="register.questionKey">What is your default recovery key?</option>
                        <option value="What was the name of your first pet?" th:selected="${user.recoveryQuestion == 'What was the name of your first pet?'}" data-i18n="register.questionPet">What was the name of your first pet?</option>
                        <option value="In what city were you born?" th:selected="${user.recoveryQuestion == 'In what city were you born?'}" data-i18n="register.questionCity">In what city were you born?</option>
                        <option value="What is your favorite food?" th:selected="${user.recoveryQuestion == 'What is your favorite food?'}" data-i18n="register.questionFood">What is your favorite food?</option>
                        <option value="What was the name of your primary school?" th:selected="${user.recoveryQuestion == 'What was the name of your primary school?'}" data-i18n="register.questionSchool">What was the name of your primary school?</option>
                    </select>
                </div>
            </div>

            <!-- Security Answer Field -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 items-center">
                <label class="text-sm font-semibold text-gray-700" data-i18n="profile.recoveryAnswer">Security Answer</label>
                <div class="md:col-span-2 relative">
                    <input
                            type="text"
                            name="recoveryAnswer"
                            th:value="${user.recoveryAnswer}"
                            required
                            data-i18n-placeholder="profile.recoveryAnswer"
                            placeholder="Enter the answer"
                            class="input-focus w-full border-2 border-gray-200 px-4 py-3 rounded-xl outline-none transition-all text-gray-900">
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex justify-end gap-3">
                <a href="/" class="bg-slate-100 hover:bg-slate-200 px-6 py-3.5 rounded-xl font-bold text-gray-600 transition-all text-sm" data-i18n="profile.cancelBtn">
                    Cancel
                </a>
                <button
                        type="submit"
                        class="btn-primary text-white px-8 py-3.5 rounded-xl font-bold text-sm shadow-md flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span data-i18n="profile.updateBtn">Save Changes</span>
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
